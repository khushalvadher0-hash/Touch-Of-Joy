{% extends 'admin_base.html' %}
{% block admin_content %}
<form method="get" class="row g-2 mb-4">
  <div class="col-sm-9">
    <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Search by name or email">
  </div>
  <div class="col-sm-3">
    <button class="btn btn-primary w-100">Search</button>
  </div>
</form>
<table class="table table-hover">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Password</th>
    </tr>
  </thead>
  <tbody>
    {% for user in users %}
      <tr>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td><span class="text-muted">Hidden for security</span></td>
      </tr>
    {% else %}
      <tr><td colspan="3" class="text-center text-muted">No users found.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
