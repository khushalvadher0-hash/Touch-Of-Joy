{% extends 'base.html' %}
{% block content %}
<div class="row">
  <div class="col-lg-3 mb-4">
    <div class="list-group admin-sidebar">
      <a href="{{ url_for('admin.users') }}" class="list-group-item list-group-item-action {% if active == 'users' %}active{% endif %}">User list</a>
      <a href="{{ url_for('admin.services') }}" class="list-group-item list-group-item-action {% if active == 'services' %}active{% endif %}">Services</a>
      <a href="{{ url_for('admin.messages') }}" class="list-group-item list-group-item-action {% if active == 'messages' %}active{% endif %}">Messages</a>
      <a href="{{ url_for('admin.schedule') }}" class="list-group-item list-group-item-action {% if active == 'schedule' %}active{% endif %}">Schedule</a>
      <a href="{{ url_for('admin.database') }}" class="list-group-item list-group-item-action {% if active == 'database' %}active{% endif %}">Database</a>
    </div>
  </div>
  <div class="col-lg-9">
    <div class="card shadow-sm admin-card p-4">
      <div class="d-flex align-items-center mb-4 gap-3">
        <img src="{{ url_for('main.uploaded_file', filename='Touch Of Joy.jpg') }}" alt="Touch Of Joy logo" class="admin-logo">
        <div>
          <h3 class="mb-1">Admin Portal</h3>
          <p class="text-muted mb-0">Manage users, services, schedule, and database.</p>
        </div>
      </div>
      {% block admin_content %}{% endblock %}
    </div>
  </div>
</div>
{% endblock %}
